apiVersion: apps/v1
kind: Deployment
metadata:
  name: classifier
  namespace: northwind
  labels:
    app: classifier
spec:
  replicas: 2
  selector:
    matchLabels:
      app: classifier
  template:
    metadata:
      labels:
        app: classifier
    spec:
      # TODO(step5): replace __IMAGE__ with your ACR image reference, e.g.
      #   acrai20012345.azurecr.io/classifier@sha256:abcd...
      containers:
        - name: classifier
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
