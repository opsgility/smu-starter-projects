apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: classifier
  namespace: northwind
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: classifier
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
