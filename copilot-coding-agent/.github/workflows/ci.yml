name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check syntax
        run: node --check src/server.js && node --check src/tasks.js

      - name: Smoke test — server starts and /api/health responds
        run: |
          npm start &
          SERVER_PID=$!
          sleep 2
          curl --fail http://localhost:3000/api/health
          kill $SERVER_PID
