spring.application.name=freightflow
spring.datasource.url=jdbc:h2:mem:freightdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# TODO Lesson 6 Exercise 2: Configure HikariCP pool settings
