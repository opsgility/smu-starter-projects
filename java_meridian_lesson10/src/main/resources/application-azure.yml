# application-azure.yml — PostgreSQL + Key Vault
spring:
  cloud:
    azure:
      keyvault:
        secret:
          enabled: true
          endpoint: https://${KEYVAULT_NAME}.vault.azure.net/
  datasource:
    # Replace YOUR_DB with your PostgreSQL server FQDN
    # Run: az postgres flexible-server show --name $DB_NAME --resource-group meridian-rg --query fullyQualifiedDomainName -o tsv
    url: jdbc:postgresql://YOUR_DB.postgres.database.azure.com:5432/customers?sslmode=require
    username: meridianadmin
    password: ${spring-datasource-password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

