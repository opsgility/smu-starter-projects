# Local development profile (H2)
spring.application.name=meridian-portal
spring.datasource.url=jdbc:h2:mem:meridiandb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
server.port=8080

# Set SPRING_PROFILES_ACTIVE=azure in App Service to activate Azure config
