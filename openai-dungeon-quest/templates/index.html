<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dungeon Quest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="static/css/style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════════════════ HEADER ═══ -->
<header id="header">
  <div id="title-text">⚔ DUNGEON QUEST ⚔</div>
  <div id="header-stats">
    <span class="stat-pill" id="stat-hp">
      <img src="static/assets/ui/heart.png" class="stat-icon" alt="HP"/>
      <span id="hp-text">100 / 100</span>
    </span>
    <span class="stat-pill" id="stat-gold">
      <img src="static/assets/ui/coin.png" class="stat-icon" alt="Gold"/>
      <span id="gold-text">0</span>
    </span>
    <label id="speech-toggle-label" class="speech-toggle" title="Read narration and dialogue aloud">
      <input type="checkbox" id="speech-toggle" />
      <span class="speech-toggle-icon">🔊</span>
      <span class="speech-toggle-text">Narrate</span>
    </label>
    <button id="btn-restart" title="Restart">↺</button>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════ MAIN ══════ -->
<main id="main">

  <!-- LEFT: scene panel -->
  <section id="scene-panel">
    <div id="room-bg-wrap">
      <img id="room-bg" src="" alt="Room" />
      <div id="room-name-overlay"></div>
    </div>
    <div id="exits-bar">
      <span class="exits-label">Exits:</span>
      <span id="exits-list"></span>
    </div>
    <div id="minimap-bar">
      <button id="minimap-toggle" title="Toggle map">
        <span class="mm-arrow">▾</span>
        <span>Map</span>
        <span id="minimap-count" class="mm-count"></span>
      </button>
      <div id="minimap"></div>
    </div>
    <div id="npcs-row" class="entity-row"></div>
    <div id="enemies-row" class="entity-row"></div>
  </section>

  <!-- RIGHT: narrative + input -->
  <section id="narrative-panel">

    <!-- combat HUD (hidden when not in combat) -->
    <div id="combat-hud" class="hidden">
      <div id="enemy-portrait-wrap">
        <img id="enemy-portrait" src="" alt="" />
        <div id="enemy-name-text"></div>
      </div>
      <div id="enemy-hp-bar-wrap">
        <div id="enemy-hp-bar"></div>
        <span id="enemy-hp-text"></span>
      </div>
      <div id="combat-actions">
        <button class="combat-btn" data-action="attack">⚔ Attack</button>
        <button class="combat-btn" data-action="defend">🛡 Defend</button>
        <button class="combat-btn" data-action="flee">💨 Flee</button>
      </div>
    </div>

    <!-- narrative log -->
    <div id="log-wrap">
      <div id="log"></div>
    </div>

    <!-- input bar -->
    <div id="input-bar">
      <span id="input-prompt">❯</span>
      <input id="cmd-input" type="text"
             placeholder="What do you do?" autocomplete="off" spellcheck="false" />
      <button id="btn-send">Send</button>
    </div>

    <!-- quick help bar -->
    <div id="quickhelp">
      <span>Commands:</span>
      <code>go [north/south/east/west]</code>
      <code>look</code>
      <code>talk to [name]</code>
      <code>fight [enemy]</code>
      <code>inventory</code>
      <code>help</code>
    </div>

  </section>

</main>

<!-- ═══════════════════════════════════════════════════════ OVERLAYS ══ -->
<div id="loading-overlay" class="hidden">
  <div id="loading-spinner"></div>
  <div id="loading-text">The dungeon stirs…</div>
</div>

<div id="game-over-overlay" class="hidden">
  <div id="game-over-box">
    <div id="game-over-title">YOU HAVE FALLEN</div>
    <div id="game-over-sub">The dungeon claims another soul.</div>
    <button id="btn-new-game">Begin Again</button>
  </div>
</div>

<script src="static/js/game.js"></script>
</body>
</html>
